# unified_enrichment default config
# Command-line args can override any key here.

[required]
work_dir=
species=hsa
gene_list=
expr_matrix=
target_genes=
ranked_list=
gmt_file=

[analysis]
analysis_mode=full
go_kegg=true
gsea=true
gsea_method=prerank

[go_kegg]
go_ont=ALL
go_pvalue=0.05
go_qvalue=0.2
go_padj=BH

[gsea]
gsea_correlation=spearman
gsea_rank_metric=log2FC
gsea_min_size=10
gsea_max_size=500
gsea_pvalue=0.05
gsea_padj=BH
gsea_exponent=1
gsea_eps=0
gsea_top_n=5

[qc]
qc_variance=0.01
qc_na_ratio=0.5
qc_gmt_match=30

[plot]
plot_width=10
plot_height=8
plot_top_n=5
plot_color=viridis

[runtime]
output_dir=results
log_dir=logs
seed=123
